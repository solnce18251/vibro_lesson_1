<!DOCTYPE html>
<!-- Объявляем тип документа как HTML5 -->
<html lang="ru">
<!-- Открываем корневой элемент страницы с указанием языка (русский) -->
<head>
  <!-- Открываем секцию с мета-информацией о странице -->
  <meta charset="UTF-8">
  <!-- Устанавливаем кодировку UTF-8 для поддержки русских символов -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Настраиваем viewport для корректного отображения на мобильных устройствах -->
  <title>Моя страница</title>
  <!-- Задаём заголовок страницы, который отображается во вкладке браузера -->
  <style>
    body {
      /* Убираем внешние отступы у body */
      margin: 0;
      /* Задаём минимальную высоту на весь видимый экран */
      min-height: 100vh;
      /* Включаем flexbox для центрирования содержимого */
      display: flex;
      /* Задаём направление flex-контейнера — вертикальное */
      flex-direction: column;
      /* Центрируем содержимое по горизонтали */
      justify-content: center;
      /* Центрируем содержимое по вертикали */
      align-items: center;
      /* Создаём линейный градиент от фиолетового к розовому */
      background: linear-gradient(135deg, #667eea, #764ba2);
      /* Устанавливаем шрифт для всего документа */
      font-family: Arial, sans-serif;
      /* Делаем текст белым */
      color: white;
      /* Добавляем отступ сверху и снизу для мобильных */
      padding: 20px;
      /* Указываем, что элементы должны располагаться с отступами */
      gap: 20px;
    }
    h1 {
      /* Увеличиваем размер заголовка */
      font-size: 3rem;
      /* Убираем стандартные отступы */
      margin: 0;
      /* Добавляем тень тексту для лучшей читаемости */
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    p {
      /* Задаём размер текста параграфа */
      font-size: 1.2rem;
      /* Центрируем текст */
      text-align: center;
      /* Ограничиваем максимальную ширину для удобства чтения */
      max-width: 600px;
      /* Добавляем тень тексту */
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }
    img {
      /* Скругляем углы изображения */
      border-radius: 15px;
      /* Добавляем тень изображению */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      /* Делаем изображение адаптивным */
      max-width: 100%;
      /* Сохраняем пропорции изображения */
      height: auto;
    }
    button {
      /* Увеличиваем размер шрифта кнопки */
      font-size: 1.2rem;
      /* Добавляем внутренние отступы для кнопки */
      padding: 15px 40px;
      /* Делаем фон кнопки белым */
      background-color: white;
      /* Делаем текст кнопки фиолетовым */
      color: #667eea;
      /* Убираем стандартную границу */
      border: none;
      /* Сильно скругляем углы кнопки */
      border-radius: 50px;
      /* Добавляем тень кнопке */
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      /* Меняем курсор на указатель при наведении */
      cursor: pointer;
      /* Добавляем плавный переход для эффектов */
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      /* При наведении немного увеличиваем кнопку */
      transform: translateY(-3px);
      /* При наведении усиливаем тень */
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
  </style>
  <script>
    // Функция для генерации случайного цвета в формате RGB
    function getRandomColor() {
      // Генерируем случайное число от 0 до 255 для красного канала
      const r = Math.floor(Math.random() * 256);
      // Генерируем случайное число от 0 до 255 для зелёного канала
      const g = Math.floor(Math.random() * 256);
      // Генерируем случайное число от 0 до 255 для синего канала
      const b = Math.floor(Math.random() * 256);
      // Возвращаем строку в формате RGB
      return `rgb(${r}, ${g}, ${b})`;
    }
    // Функция, которая вызывается при нажатии на кнопку
    function changeColorAndAlert() {
      // Получаем случайный цвет
      const newColor = getRandomColor();
      // Применяем новый цвет к фону body
      document.body.style.background = newColor;
      // Показываем уведомление
      alert('Ты нажал кнопку!');
    }
  </script>
</head>
<body>
  <!-- Открываем тело страницы — здесь находится видимое содержимое -->

  <h1>Добро пожаловать!</h1>
  <!-- Заголовок первого уровня — главный заголовок страницы -->

  <p>Это пример простой HTML-страницы с основными элементами: заголовком, текстом, изображением и кнопкой.</p>
  <!-- Параграф с текстовым содержимым -->

  <img src="https://via.placeholder.com/400x200" alt="Изображение-заглушка">
  <!-- Картинка-заглушка с внешним сервисом placeholder; alt — текстовое описание для доступности -->

  <button type="button" onclick="changeColorAndAlert()">Нажми меня</button>
  <!-- Кнопка с типом "button"; onclick вызывает функцию смены цвета и уведомление -->

</body>
<!-- Закрываем тело страницы -->
</html>
<!-- Закрываем корневой элемент html -->
