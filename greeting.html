<!DOCTYPE html>
<!-- Объявляем тип документа как HTML5 -->
<html lang="ru">
<!-- Открываем корневой элемент страницы с указанием языка (русский) -->
<head>
  <!-- Открываем секцию с мета-информацией о странице -->
  <meta charset="UTF-8">
  <!-- Устанавливаем кодировку UTF-8 для поддержки русских символов -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Настраиваем viewport для корректного отображения на мобильных устройствах -->
  <title>Приветствие</title>
  <!-- Задаём заголовок страницы, который отображается во вкладке браузера -->
  <style>
    body {
      /* Убираем внешние отступы у body */
      margin: 0;
      /* Задаём минимальную высоту на весь видимый экран */
      min-height: 100vh;
      /* Включаем flexbox для центрирования содержимого */
      display: flex;
      /* Задаём направление flex-контейнера — вертикальное */
      flex-direction: column;
      /* Центрируем содержимое по горизонтали */
      justify-content: center;
      /* Центрируем содержимое по вертикали */
      align-items: center;
      /* Создаём линейный градиент от синего к зелёному */
      background: linear-gradient(135deg, #11998e, #38ef7d);
      /* Устанавливаем шрифт для всего документа */
      font-family: Arial, sans-serif;
      /* Делаем текст белым */
      color: white;
      /* Добавляем отступ сверху и снизу для мобильных */
      padding: 20px;
      /* Указываем, что элементы должны располагаться с отступами */
      gap: 20px;
    }
    h1 {
      /* Увеличиваем размер заголовка */
      font-size: 3rem;
      /* Убираем стандартные отступы */
      margin: 0;
      /* Добавляем тень тексту для лучшей читаемости */
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      /* Центрируем текст заголовка */
      text-align: center;
    }
    button {
      /* Увеличиваем размер шрифта кнопки */
      font-size: 1.2rem;
      /* Добавляем внутренние отступы для кнопки */
      padding: 15px 40px;
      /* Делаем фон кнопки белым */
      background-color: white;
      /* Делаем текст кнопки зелёным */
      color: #11998e;
      /* Убираем стандартную границу */
      border: none;
      /* Сильно скругляем углы кнопки */
      border-radius: 50px;
      /* Добавляем тень кнопке */
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      /* Меняем курсор на указатель при наведении */
      cursor: pointer;
      /* Добавляем плавный переход для эффектов */
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      /* При наведении немного увеличиваем кнопку */
      transform: translateY(-3px);
      /* При наведении усиливаем тень */
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
  </style>
  <script>
    // Функция для запроса имени и показа приветствия
    function greetUser() {
      // Запрашиваем имя пользователя через диалоговое окно prompt
      const name = prompt('Как тебя зовут?');
      // Проверяем, введено ли имя (не null и не пустая строка после_trim)
      if (name && name.trim() !== '') {
        // Если имя введено, показываем персональное приветствие
        alert('Привет, ' + name + '!');
      } else {
        // Если имя не введено, приветствуем как незнакомец
        alert('Привет, незнакомец!');
      }
    }
  </script>
</head>
<body>
  <!-- Открываем тело страницы — здесь находится видимое содержимое -->

  <h1 id="greeting">Нажми кнопку, чтобы поздороваться!</h1>
  <!-- Заголовок первого уровня с идентификатором для возможного изменения -->

  <button type="button" onclick="greetUser()">Поздороваться</button>
  <!-- Кнопка с типом "button"; onclick вызывает функцию приветствия -->

</body>
<!-- Закрываем тело страницы -->
</html>
<!-- Закрываем корневой элемент html -->
